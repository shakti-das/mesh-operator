apiVersion: v1
kind: Service
metadata:
  labels:
    app: istio-ordering
    release: render-helm-output-manifest
  name: istio-ordering
  namespace: service-mesh
spec:
  clusterIP: 1.1.1.1
  clusterIPs:
    - 1.1.1.1
  ports:
    - name: grpc-ordering
      port: 7443
      protocol: TCP
      targetPort: 7443
  selector:
    app: istio-ordering
    name: istio-ordering
  sessionAffinity: None
  type: ClusterIP
