apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: bg_test_green
  namespace: default
spec:
  gateways:
  - mesh
  hosts:
  - my.service.cluster.local
  - my.service.mesh.io
  http:
  - fault:
      abort:
        httpStatus: 500
    match:
    - port: 7442
    name: bg_test_green
    retries:
      attempts: 5
    route:
    - destination:
        host: bg1-app
        port:
          number: 7442
        subset: live
