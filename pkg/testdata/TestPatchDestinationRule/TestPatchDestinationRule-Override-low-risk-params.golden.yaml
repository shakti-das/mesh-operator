apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  labels:
    app: istio-shipping
  name: istio-shipping
  namespace: service-mesh
spec:
  host: istio-shipping.service-mesh.svc.cluster.local
  trafficPolicy:
    connectionPool:
      http:
        http1MaxPendingRequests: 1024
        http2MaxRequests: 100
        maxRetries: 10
      tcp:
        maxConnections: 100
        tcpKeepalive:
          time: 300s
    loadBalancer:
      simple: LEAST_CONN
      warmupDurationSecs: 3m
    outlierDetection:
      baseEjectionTime: 1h
      consecutive5xxErrors: 1
      maxEjectionPercent: 50
    tls:
      caCertificates: /etc/certs/root-cert.pem
      clientCertificate: /etc/certs/client.pem
      mode: MUTUAL
      privateKey: /etc/certs/client-key.pem
      subjectAltNames:
      - istio-shipping.service-mesh.sfdc-role
