apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  labels:
    some-label: some-value
  name: test-vs
  namespace: default
spec:
  gateways:
  - mesh
  hosts:
  - my.service.cluster.local
  - my.service.mesh.io
  http:
  - name: default
    retries:
      attempts: 5
    route:
    - destination:
        host: my.service.prod.mesh.io
    timeout: 15s
