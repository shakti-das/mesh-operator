apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: test-vs
  namespace: default
spec:
  gateways:
  - mesh
  hosts:
  - additional.host.my.sevice.mesh.io
  - my.service.cluster.local
  http:
  - name: default
    retries:
      attempts: 5
    route:
    - destination:
        host: my.service.prod.mesh.io
    timeout: 15s
